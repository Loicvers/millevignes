<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>L'Atelier des Mille Vignes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#16130f;--paper:#faf8f3;--paper2:#f1ede4;--line:#d9d2c4;
    --wine:#5b1a24;--wine-soft:#7a2c38;--gold:#8a6d3b;--muted:#6b6357;
    --green:#5c7a4f;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--paper);color:var(--ink);font-family:'Inter',sans-serif;line-height:1.55;font-size:16px}
  .wrap{max-width:1100px;margin:0 auto;padding:0 20px}

  header{border-bottom:1px solid var(--line)}
  .head-inner{display:flex;align-items:baseline;justify-content:space-between;gap:16px;padding:22px 0 18px;flex-wrap:wrap}
  .brand{font-family:'Cormorant',serif;font-weight:600;font-size:30px;letter-spacing:.5px;line-height:1}
  .brand .sub{display:block;font-family:'Inter';font-weight:500;font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);margin-top:7px}

  /* mode tabs */
  .tabs{display:flex;gap:0;border-bottom:1px solid var(--line)}
  .tab{flex:1;text-align:center;padding:13px 8px;font-size:13px;font-weight:600;letter-spacing:.04em;background:var(--paper2);border:none;border-right:1px solid var(--line);cursor:pointer;color:var(--muted);font-family:inherit;transition:all .15s}
  .tab:last-child{border-right:none}
  .tab.on{background:var(--paper);color:var(--ink);box-shadow:inset 0 -3px 0 var(--wine)}
  .tab .badge{display:inline-block;min-width:18px;padding:0 5px;margin-left:5px;font-size:11px;background:var(--wine);color:#fff;border-radius:20px;line-height:18px}

  .filters{background:var(--paper2);border-bottom:1px solid var(--line);padding:16px 0}
  .filt-row{display:flex;gap:26px;flex-wrap:wrap;align-items:flex-start}
  .filt-group{flex:1;min-width:260px}
  .filt-label{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;display:flex;align-items:center;gap:7px}
  .filt-label .dot{width:6px;height:6px;border-radius:50%}
  .chips{display:flex;flex-wrap:wrap;gap:6px}
  .chip{font-size:12.5px;border:1px solid var(--line);background:var(--paper);padding:5px 11px;border-radius:40px;cursor:pointer;color:var(--ink);transition:all .15s;font-family:inherit}
  .chip:hover{border-color:var(--gold)}
  .chip.on{background:var(--ink);color:var(--paper);border-color:var(--ink)}
  .sub-panel{margin-top:10px;padding-top:10px;border-top:1px dotted var(--line);display:none}
  .sub-panel.show{display:block}
  .sub-panel .sub-lbl{font-size:9.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:7px}
  .chip.sub{font-size:11.5px;padding:4px 9px}
  .chip.sub.on{background:var(--gold);border-color:var(--gold);color:#fff}

  .geo-tree{font-size:13px}
  .geo-node{cursor:pointer;padding:2px 0;user-select:none}
  .geo-node .tw{display:inline-block;width:14px;color:var(--muted)}
  .geo-pays{font-weight:600}.geo-region{padding-left:16px}.geo-appel{padding-left:34px;color:var(--wine-soft)}
  .geo-appel.on,.geo-region.on{color:var(--wine);font-weight:600}
  .geo-appel:hover,.geo-region:hover,.geo-pays:hover{color:var(--wine)}
  .geo-hidden{display:none}

  .filt-foot{display:flex;justify-content:space-between;align-items:center;margin-top:14px;flex-wrap:wrap;gap:10px}
  .count{font-size:13px;color:var(--muted)}.count b{color:var(--ink)}
  .clear{font-size:12px;color:var(--wine);background:none;border:none;cursor:pointer;text-decoration:underline;font-family:inherit}

  main{padding:26px 0 80px}
  .intro{font-family:'Cormorant',serif;font-size:18px;color:var(--muted);margin-bottom:20px;font-style:italic}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:18px}
  .card{background:var(--paper);border:1px solid var(--line);border-radius:3px;padding:20px 20px 18px;display:flex;flex-direction:column;position:relative;overflow:hidden}
  .card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--gold)}
  .card.t-geo::before{background:var(--wine)}
  .card-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px}
  .tag{font-size:10px;letter-spacing:.08em;text-transform:uppercase;padding:3px 8px;border-radius:3px;font-weight:600}
  .tag.theme{background:var(--ink);color:var(--paper)}
  .tag.geo{background:var(--wine);color:#fff}
  .tag.niv{background:var(--paper2);color:var(--muted);border:1px solid var(--line)}
  .tag.due{background:var(--green);color:#fff}
  .sub-tags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px}
  .sub-tag{font-size:10px;color:var(--gold);border:1px solid var(--gold);padding:1px 7px;border-radius:30px}
  .card h3{font-family:'Cormorant',serif;font-weight:600;font-size:23px;line-height:1.15;margin-bottom:9px}
  .synth{font-size:14.5px;color:#3a342c;margin-bottom:14px}
  .mnemo{background:var(--paper2);border-left:3px solid var(--gold);padding:10px 12px;font-size:13.5px;border-radius:0 3px 3px 0;margin-bottom:14px}
  .mnemo .m-lbl{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;display:block;margin-bottom:3px}
  .src{font-size:14px;color:var(--muted);margin-top:auto;padding-top:10px;border-top:1px dotted var(--line);font-style:italic;font-family:'Cormorant',serif}

  .flash{perspective:1000px;margin-bottom:6px;height:92px;cursor:pointer}
  .flash-in{position:relative;width:100%;height:100%;transition:transform .5s;transform-style:preserve-3d}
  .flash.flip .flash-in{transform:rotateY(180deg)}
  .flash-face{position:absolute;inset:0;backface-visibility:hidden;border:1px dashed var(--gold);border-radius:3px;display:flex;align-items:center;justify-content:center;text-align:center;padding:10px 14px;font-size:13.5px;background:var(--paper)}
  .flash-front{font-weight:500}
  .flash-back{transform:rotateY(180deg);background:var(--ink);color:var(--paper);border-style:solid;border-color:var(--ink)}
  .flash-hint{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);text-align:center;margin-bottom:12px}

  .qcm{border-top:1px dotted var(--line);padding-top:13px}
  .q{font-size:13.5px;font-weight:600;margin-bottom:9px}
  .opt{display:block;width:100%;text-align:left;font-family:inherit;font-size:13px;padding:8px 11px;margin-bottom:6px;border:1px solid var(--line);background:var(--paper);border-radius:3px;cursor:pointer;transition:all .12s}
  .opt:hover{border-color:var(--gold)}
  .opt.good{background:#e7efe4;border-color:var(--green);color:#2f4226}
  .opt.bad{background:#f2e2e2;border-color:#a85a5a;color:#6e2a2a}
  .opt:disabled{cursor:default}

  /* spaced-repetition rating */
  .srs{margin-top:13px;border-top:1px dotted var(--line);padding-top:12px;display:none}
  .srs.show{display:block}
  .srs-lbl{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;text-align:center}
  .srs-btns{display:flex;gap:6px}
  .srs-btn{flex:1;font-family:inherit;font-size:12px;font-weight:600;padding:9px 4px;border-radius:3px;border:1px solid var(--line);cursor:pointer;background:var(--paper);transition:all .12s}
  .srs-btn .sub2{display:block;font-size:9px;font-weight:400;color:var(--muted);margin-top:2px}
  .srs-hard:hover{background:#f2e2e2;border-color:#a85a5a}
  .srs-ok:hover{background:#f0ead8;border-color:var(--gold)}
  .srs-easy:hover{background:#e7efe4;border-color:var(--green)}
  .srs-done{font-size:12px;color:var(--green);text-align:center;font-weight:600}

  .empty{text-align:center;padding:70px 20px;color:var(--muted)}
  .empty h3{font-family:'Cormorant',serif;font-size:26px;color:var(--ink);margin-bottom:8px}

  footer{border-top:1px solid var(--line);padding:24px 0;font-size:12px;color:var(--muted);text-align:center}
  .reset-all{font-size:11px;color:var(--muted);background:none;border:none;cursor:pointer;text-decoration:underline;font-family:inherit}

  @media(max-width:560px){.brand{font-size:25px}.grid{grid-template-columns:1fr}.tab{font-size:11.5px;padding:11px 4px}}
</style>
</head>
<body>

<header>
  <div class="wrap head-inner">
    <div class="brand">L'Atelier des Mille Vignes<span class="sub">Base de révision œnologique</span></div>
  </div>
  <div class="tabs">
    <button class="tab on" data-mode="revision">Réviser</button>
    <button class="tab" data-mode="due">À revoir <span class="badge" id="dueBadge">0</span></button>
    <button class="tab" data-mode="atelier">Atelier masterclass</button>
  </div>
</header>

<div class="filters" id="filterBar">
  <div class="wrap">
    <div class="filt-row">
      <div class="filt-group">
        <div class="filt-label"><span class="dot" style="background:var(--ink)"></span>Le quoi — Thèmes</div>
        <div class="chips" id="themeChips"></div>
        <div class="sub-panel" id="subPanel"><div class="sub-lbl" id="subLbl">Sous-thèmes</div><div class="chips" id="subChips"></div></div>
      </div>
      <div class="filt-group">
        <div class="filt-label"><span class="dot" style="background:var(--wine)"></span>Le où — Géographie</div>
        <div class="geo-tree" id="geoTree"></div>
      </div>
    </div>
    <div class="filt-foot">
      <div class="count"><b id="shown">0</b> fiche(s) · <b id="acq">0</b> acquise(s)</div>
      <button class="clear" id="clearBtn">Réinitialiser les filtres</button>
    </div>
  </div>
</div>

<main><div class="wrap">
  <p class="intro" id="introLine"></p>
  <div class="grid" id="grid"></div>
</div></main>

<footer class="wrap">
  L'Atelier des Mille Vignes — chaque fiche reformulée et créditée à sa source<br><br>
  <button class="reset-all" id="resetAll">Réinitialiser toute ma progression</button>
</footer>

<script src="fiches.js"></script>
<script>
/* ============ PERSISTANCE (localStorage) ============ */
const PKEY="mv_progress_v1";
let prog=JSON.parse(localStorage.getItem(PKEY)||"{}");
// prog[id] = {ease, interval(jours), due(timestamp), acquired:bool}
function save(){localStorage.setItem(PKEY,JSON.stringify(prog));}
function now(){return Date.now();}
const DAY=86400000;

/* ============ RÉPÉTITION ESPACÉE (type SM-2 simplifié) ============ */
function rate(id,quality){ // quality: 'hard'|'ok'|'easy'
  let p=prog[id]||{ease:2.3,interval:0,due:0,acquired:false};
  if(quality==='hard'){p.ease=Math.max(1.3,p.ease-0.2);p.interval=1;}
  else if(quality==='ok'){p.interval=p.interval?Math.round(p.interval*p.ease):1;}
  else{p.ease=p.ease+0.1;p.interval=p.interval?Math.round(p.interval*p.ease*1.3):2;}
  p.due=now()+p.interval*DAY;
  p.acquired=true;
  prog[id]=p;save();updateBadges();
}
function isDue(id){const p=prog[id];if(!p)return true;return p.due<=now();}
function dueList(){return FICHES.filter(f=>prog[f.id]&&prog[f.id].due<=now());}

/* ============ ÉTAT FILTRES ============ */
let mode="revision";
let activeThemes=new Set(),activeSubs=new Set(),activeGeo=null;

/* ============ GÉO arbre ============ */
const GEO={};
FICHES.forEach(f=>{if(!f.geo)return;const{pays,region,appel}=f.geo;GEO[pays]=GEO[pays]||{};if(region){GEO[pays][region]=GEO[pays][region]||new Set();if(appel)GEO[pays][region].add(appel);}});

const themeChips=document.getElementById('themeChips');
const subPanel=document.getElementById('subPanel'),subChips=document.getElementById('subChips'),subLbl=document.getElementById('subLbl');
const themesPresent=THEME_ORDER.filter(t=>FICHES.some(f=>f.theme===t));
themesPresent.forEach(t=>{
  const b=document.createElement('button');b.className='chip';b.textContent=t;
  b.onclick=()=>{activeThemes.has(t)?activeThemes.delete(t):activeThemes.add(t);b.classList.toggle('on');buildSub();render();};
  themeChips.appendChild(b);
});
function buildSub(){
  subChips.innerHTML='';
  if(activeThemes.size===1){
    const t=[...activeThemes][0];
    if(SOUS[t]&&SOUS[t].length){
      subLbl.textContent='Sous-thèmes — '+t;
      SOUS[t].forEach(s=>{const b=document.createElement('button');b.className='chip sub';b.textContent=s;if(activeSubs.has(s))b.classList.add('on');
        b.onclick=()=>{activeSubs.has(s)?activeSubs.delete(s):activeSubs.add(s);b.classList.toggle('on');render();};subChips.appendChild(b);});
      subPanel.classList.add('show');return;
    }
  }
  activeSubs.clear();subPanel.classList.remove('show');
}

const geoTree=document.getElementById('geoTree');
Object.keys(GEO).forEach(pays=>{
  const pn=document.createElement('div');pn.className='geo-node geo-pays';pn.innerHTML='<span class="tw">▾</span>'+pays;geoTree.appendChild(pn);
  const rw=document.createElement('div');
  Object.keys(GEO[pays]).forEach(region=>{
    const rn=document.createElement('div');rn.className='geo-node geo-region';rn.innerHTML='<span class="tw">›</span>'+region;
    rn.onclick=e=>{e.stopPropagation();selGeo({region});};rw.appendChild(rn);
    [...GEO[pays][region]].forEach(appel=>{const an=document.createElement('div');an.className='geo-node geo-appel';an.textContent=appel;an.onclick=e=>{e.stopPropagation();selGeo({region,appel});};rw.appendChild(an);});
  });
  geoTree.appendChild(rw);
  pn.onclick=()=>{rw.classList.toggle('geo-hidden');pn.querySelector('.tw').textContent=rw.classList.contains('geo-hidden')?'▸':'▾';};
});
function selGeo(sel){
  const same=activeGeo&&activeGeo.region===sel.region&&activeGeo.appel===sel.appel;
  activeGeo=same?null:sel;
  document.querySelectorAll('.geo-region,.geo-appel').forEach(n=>n.classList.remove('on'));
  if(activeGeo)document.querySelectorAll('.geo-region,.geo-appel').forEach(n=>{const txt=n.textContent.replace('›','').trim();if(activeGeo.appel&&txt===activeGeo.appel)n.classList.add('on');else if(!activeGeo.appel&&txt===activeGeo.region&&n.classList.contains('geo-region'))n.classList.add('on');});
  render();
}
document.getElementById('clearBtn').onclick=()=>{activeThemes.clear();activeSubs.clear();activeGeo=null;document.querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));document.querySelectorAll('.geo-region,.geo-appel').forEach(n=>n.classList.remove('on'));subPanel.classList.remove('show');render();};

/* ============ TABS ============ */
document.querySelectorAll('.tab').forEach(t=>{
  t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));t.classList.add('on');mode=t.dataset.mode;document.getElementById('filterBar').style.display=mode==='due'?'none':'block';render();};
});

/* ============ RENDER ============ */
const grid=document.getElementById('grid');
function matches(f){
  if(activeThemes.size&&!activeThemes.has(f.theme))return false;
  if(activeSubs.size){const fs=f.sous||[];if(![...activeSubs].some(s=>fs.includes(s)))return false;}
  if(activeGeo){if(!f.geo)return false;if(activeGeo.appel)return f.geo.appel===activeGeo.appel;return f.geo.region===activeGeo.region;}
  return true;
}
function render(){
  let list;
  if(mode==='due'){list=dueList();document.getElementById('introLine').textContent=list.length?'Les fiches que la répétition espacée te represente aujourd\'hui.':'';}
  else{list=FICHES.filter(matches);document.getElementById('introLine').textContent= mode==='atelier'?'Filtre par thème ou région pour rassembler la matière d\'une masterclass.':'';}
  document.getElementById('shown').textContent=list.length;
  document.getElementById('acq').textContent=Object.values(prog).filter(p=>p.acquired).length;
  grid.innerHTML='';
  if(!list.length){
    const msg=mode==='due'?{t:'Rien à revoir pour le moment',s:'Reviens plus tard : les fiches réapparaîtront selon ton rythme de mémorisation.'}:{t:'Aucune fiche ne correspond',s:'Ajuste les filtres ou réinitialise.'};
    grid.innerHTML=`<div class="empty" style="grid-column:1/-1"><h3>${msg.t}</h3><p>${msg.s}</p></div>`;return;
  }
  list.forEach(f=>grid.appendChild(card(f)));
}
function card(f){
  const c=document.createElement('div');c.className='card'+(f.theme==='Géographie viticole'?' t-geo':'');
  const geoTag=f.geo?`<span class="tag geo">${f.geo.appel||f.geo.region}</span>`:'';
  const dueTag=isDue(f.id)&&prog[f.id]?'<span class="tag due">à revoir</span>':'';
  const subTags=(f.sous||[]).map(s=>`<span class="sub-tag">${s}</span>`).join('');
  c.innerHTML=`
    <div class="card-tags"><span class="tag theme">${f.theme}</span>${geoTag}<span class="tag niv">${f.niveau}</span>${dueTag}</div>
    <div class="sub-tags">${subTags}</div>
    <h3>${f.titre}</h3>
    <p class="synth">${f.synth}</p>
    <div class="mnemo"><span class="m-lbl">Astuce mémo</span>${f.mnemo}</div>
    <div class="flash-hint">Flashcard — touche pour retourner</div>
    <div class="flash"><div class="flash-in"><div class="flash-face flash-front">${f.flash.q}</div><div class="flash-face flash-back">${f.flash.a}</div></div></div>
    <div class="qcm"><div class="q">${f.qcm.q}</div><div class="opts"></div></div>
    <div class="srs"><div class="srs-lbl">Comment l'as-tu retenue ?</div><div class="srs-btns">
      <button class="srs-btn srs-hard">Difficile<span class="sub2">revoir demain</span></button>
      <button class="srs-btn srs-ok">Correct<span class="sub2">à intervalle</span></button>
      <button class="srs-btn srs-easy">Facile<span class="sub2">espacer</span></button>
    </div></div>
    <div class="src">— ${f.src}${f.page?', p.\u00a0'+f.page:''}</div>`;
  const flash=c.querySelector('.flash');flash.onclick=()=>flash.classList.toggle('flip');
  const opts=c.querySelector('.opts'),srs=c.querySelector('.srs');
  f.qcm.opts.forEach((o,i)=>{const b=document.createElement('button');b.className='opt';b.textContent=o;
    b.onclick=()=>{[...opts.children].forEach(x=>x.disabled=true);if(i===f.qcm.good)b.classList.add('good');else{b.classList.add('bad');opts.children[f.qcm.good].classList.add('good');}srs.classList.add('show');};
    opts.appendChild(b);});
  srs.querySelector('.srs-hard').onclick=()=>finishRate(f.id,'hard',srs,c);
  srs.querySelector('.srs-ok').onclick=()=>finishRate(f.id,'ok',srs,c);
  srs.querySelector('.srs-easy').onclick=()=>finishRate(f.id,'easy',srs,c);
  return c;
}
function finishRate(id,q,srs,c){
  rate(id,q);
  const lbl={hard:'Revue demain',ok:'Revue à intervalle',easy:'Bien acquise — espacée'}[q];
  srs.innerHTML=`<div class="srs-done">✓ ${lbl}</div>`;
  if(mode==='due')setTimeout(()=>{if(!isDue(id))c.style.opacity=.4;},400);
}
function updateBadges(){document.getElementById('dueBadge').textContent=dueList().length;}

updateBadges();render();
document.getElementById('resetAll').onclick=()=>{if(confirm('Effacer toute ta progression de mémorisation ?')){prog={};save();updateBadges();render();}};
</script>
</body>
</html>
